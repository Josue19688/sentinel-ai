version: "3.9"

services:
  ml-api:
    build: ./ml-service
    container_name: sentinel_api_staging
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ml:ml@ml-db:5432/ml_features}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MODEL_MODE=SHADOW
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APP_ENV=STAGING
      - LOG_LEVEL=INFO
    volumes:
      - ml_artifacts:/app/model_artifacts
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      - ml-db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2

  ml-worker:
    build: ./ml-service
    container_name: sentinel_worker_staging
    command: celery -A app.worker worker --loglevel=info --concurrency=2 -B
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ml:ml@ml-db:5432/ml_features}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ml_artifacts:/app/model_artifacts
    depends_on:
      - ml-db
      - redis

  ml-db:
    image: timescale/timescaledb:latest-pg15
    container_name: sentinel_db_staging
    environment:
      - POSTGRES_DB=${DB_NAME:-ml_features}
      - POSTGRES_USER=${DB_USER:-ml}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ml_pgdata_staging:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis_staging
    command: redis-server --requirepass "${REDIS_PASSWORD}"

volumes:
  ml_pgdata_staging:
  ml_artifacts:
