name:CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run Tests
        run: |
          cd ml-service
          python -m pytest --cov=app --cov-fail-under=30
      - name: Verify Migrations
        env:
          DATABASE_URL: postgresql://postgres:test@127.0.0.1:5432/test_db
        run: |
          cd ml-service
          # Esperar a que Postgres esté realmente listo para aceptar conexiones TCP
          timeout 30s bash -c 'until printf "" 2>>/dev/null >>/dev/tcp/127.0.0.1/5432; do sleep 1; done'
          alembic upgrade head
