version: "3.9"

services:
  ml-api:
    build: ./ml-service
    container_name: sentinel_api_dev
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ml:ml@ml-db:5432/ml_features}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MODEL_MODE=${MODEL_MODE:-SHADOW}
      - SECRET_KEY=dev_secret_key
      - JWT_SECRET_KEY=dev_jwt_secret_key
      - APP_ENV=DEVELOPMENT
      - LOG_LEVEL=DEBUG
    volumes:
      - ./ml-service:/app
      - ml_artifacts:/app/model_artifacts
    depends_on:
      - ml-db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  ml-worker:
    build: ./ml-service
    container_name: sentinel_worker_dev
    command: celery -A app.worker worker --loglevel=debug -B
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ml:ml@ml-db:5432/ml_features}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=dev_secret_key
    volumes:
      - ./ml-service:/app
      - ml_artifacts:/app/model_artifacts
    depends_on:
      - ml-db
      - redis

  ml-db:
    image: timescale/timescaledb:latest-pg15
    container_name: sentinel_db_dev
    environment:
      - POSTGRES_DB=ml_features
      - POSTGRES_USER=ml
      - POSTGRES_PASSWORD=dev_password
    ports:
      - "5432:5432"
    volumes:
      - ml_pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis_dev
    ports:
      - "6379:6379"

volumes:
  ml_pgdata_dev:
  ml_artifacts:
