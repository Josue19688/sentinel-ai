version: "3.9"

services:
  ml-api:
    build: ./ml-service
    container_name: sentinel_api_prod
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ml:ml@ml-db:5432/ml_features}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MODEL_MODE=LIVE
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APP_ENV=PRODUCTION
      - LOG_LEVEL=WARNING
    volumes:
      - ml_artifacts:/app/model_artifacts
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    depends_on:
      - ml-db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 4

  ml-worker:
    build: ./ml-service
    container_name: sentinel_worker_prod
    command: celery -A app.worker worker --loglevel=info --concurrency=4 -B
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ml:ml@ml-db:5432/ml_features}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ml_artifacts:/app/model_artifacts
    depends_on:
      - ml-db
      - redis

  nginx:
    image: nginx:alpine
    container_name: sentinel_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certs should be mounted here
    depends_on:
      - ml-api

  ml-db:
    image: timescale/timescaledb:latest-pg15
    container_name: sentinel_db_prod
    environment:
      - POSTGRES_DB=${DB_NAME:-ml_features}
      - POSTGRES_USER=${DB_USER:-ml}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ml_pgdata_prod:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis_prod
    command: redis-server --requirepass "${REDIS_PASSWORD}"

volumes:
  ml_pgdata_prod:
  ml_artifacts:
